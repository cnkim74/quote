<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>경남본부 배전맨홀 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:#0d1117;color:#e6edf3;
}
#hd{
  flex-shrink:0;height:44px;
  background:#161b22;border-bottom:1.5px solid #e94560;
  padding:0 12px;display:flex;align-items:center;gap:8px;
}
#hd h1{font-size:13px;color:#e94560;font-weight:700;flex:1;}
#hd-cnt{font-size:11px;color:#8b949e;}
#fb{
  flex-shrink:0;height:40px;
  background:#0d1117;border-bottom:1px solid #21262d;
  display:flex;gap:6px;padding:0 10px;overflow-x:auto;align-items:center;
  scrollbar-width:none;
}
#fb::-webkit-scrollbar{display:none;}
.bb{
  padding:3px 9px;border-radius:11px;border:1.5px solid currentColor;
  background:transparent;cursor:pointer;font-size:11px;font-family:inherit;
  opacity:0.35;white-space:nowrap;flex-shrink:0;
}
.bb.on{opacity:1;background:rgba(255,255,255,0.08);}

/* 지도 영역 - flex로 남은 공간 차지 */
#map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100% !important;}

/* 지도 위 버튼들 */
#mode-wrap{position:absolute;top:10px;right:10px;z-index:900;display:flex;flex-direction:column;gap:4px;}
.mmode{
  padding:5px 9px;border-radius:9px;border:1px solid #30363d;
  background:rgba(22,27,34,0.95);cursor:pointer;font-size:11px;
  color:#8b949e;font-family:inherit;
}
.mmode.on{background:#1f6feb;border-color:#1f6feb;color:#fff;}
#rbtn{
  position:absolute;bottom:100px;left:12px;z-index:900;
  padding:11px 15px;background:#e94560;color:#fff;
  border:none;border-radius:14px;cursor:pointer;
  font-size:12px;font-family:inherit;font-weight:700;
}
#rbtn:disabled{background:#30363d;color:#656d76;}
#clr-btn{
  position:absolute;bottom:100px;left:130px;z-index:900;
  padding:11px 12px;background:rgba(22,27,34,0.95);
  color:#8b949e;border:1px solid #30363d;border-radius:14px;
  cursor:pointer;font-size:12px;font-family:inherit;display:none;
}

/* 바텀 시트 */
#sheet{
  flex-shrink:0;background:#161b22;
  border-top:1px solid #21262d;
  border-radius:18px 18px 0 0;
  transition:max-height 0.32s cubic-bezier(.4,0,.2,1);
  max-height:48px;overflow:hidden;
}
#sheet.open{max-height:75vh;}
#sheet-handle{display:flex;align-items:center;justify-content:center;padding:10px;cursor:pointer;}
#handle-bar{width:36px;height:4px;background:#30363d;border-radius:2px;}
#sheet-peek{display:flex;align-items:center;gap:8px;padding:0 14px 8px;}
#sheet-name{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#rvbtn{
  padding:6px 12px;background:#ffa726;color:#000;
  border:none;border-radius:9px;cursor:pointer;
  font-size:11px;font-family:inherit;font-weight:700;flex-shrink:0;display:none;
}
#sheet-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(75vh - 90px);}
#sv-img{width:100%;height:160px;object-fit:cover;display:none;}
#sv-loading{width:100%;height:100px;display:none;align-items:center;justify-content:center;}
#sv-loading p{font-size:12px;color:#656d76;}
#sv-none{width:100%;height:70px;display:none;align-items:center;justify-content:center;}
#sv-none p{font-size:12px;color:#30363d;}
#sheet-body{padding:10px 14px 6px;}
.ir{display:flex;gap:8px;margin-bottom:5px;line-height:1.6;}
.il{color:#656d76;min-width:60px;font-size:11px;flex-shrink:0;}
.iv{color:#e6edf3;font-size:12px;}
.tag{display:inline-block;padding:2px 8px;border-radius:7px;font-size:11px;font-weight:700;margin-right:4px;}
#route-wrap{display:none;padding:0 14px 20px;}
#route-title{font-size:12px;color:#f5a623;font-weight:700;padding:6px 0;}
.ri{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #21262d;cursor:pointer;}
.rn{border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;color:#fff;}
</style>
</head>
<body>

<div id="hd">
  <h1>⚡ 경남본부 배전맨홀 2026</h1>
  <span id="hd-cnt">598개</span>
</div>

<div id="fb">
  <button class="bb on" data-b="all" style="color:#fff">전체</button>
  <button class="bb on" data-b="경남본부직할" style="color:#42a5f5">본부직할 320</button>
  <button class="bb on" data-b="밀양지사"    style="color:#66bb6a">밀양 233</button>
  <button class="bb on" data-b="진해지사"    style="color:#ffa726">진해 30</button>
  <button class="bb on" data-b="거제지사"    style="color:#ce93d8">거제 10</button>
  <button class="bb on" data-b="진주지사"    style="color:#ef9a9a">진주 2</button>
  <button class="bb on" data-b="함양지사"    style="color:#fff176">함양 2</button>
  <button class="bb on" data-b="고성지사"    style="color:#4dd0e1">고성 1</button>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="mode-wrap">
    <button class="mmode on" data-m="branch">지사명</button>
    <button class="mmode"    data-m="seq">순번</button>
    <button class="mmode"    data-m="code">번호</button>
  </div>
  <button id="rbtn">🗺️ 최적경로</button>
  <button id="clr-btn">✕ 초기화</button>
</div>

<div id="sheet">
  <div id="sheet-handle"><div id="handle-bar"></div></div>
  <div id="sheet-peek">
    <span id="sheet-name" style="color:#30363d">마커를 탭하세요</span>
    <button id="rvbtn">🚗 로드뷰</button>
  </div>
  <div id="sheet-scroll">
    <div id="sv-loading"><p>📷 전경사진 불러오는 중...</p></div>
    <div id="sv-none"><p>📷 스트리트뷰 미지원 위치</p></div>
    <img id="sv-img" alt="전경사진"/>
    <div id="sheet-body"></div>
    <div id="route-wrap">
      <div id="route-title"></div>
      <div id="route-list"></div>
    </div>
  </div>
</div>

// Leaflet 초기화 - flex 레이아웃이므로 map-wrap이 이미 올바른 크기
const map=L.map('map',{center:[35.3,128.6],zoom:9,zoomControl:false,tap:true,tapTolerance:15});

let GD=[],PL=null,curMode='branch',sheetOpen=false;

function makePin(c,label){
  const fs=label.length>3?7:label.length>2?8:9;
  const s=`<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38">
    <path d="M15 0C7 0 0 7 0 15C0 26 15 38 15 38S30 26 30 15C30 7 23 0 15 0Z" fill="${c}" stroke="rgba(255,255,255,0.5)" stroke-width="1.3"/>
    <circle cx="15" cy="15" r="9" fill="rgba(0,0,0,0.18)"/>
    <text x="15" y="19" text-anchor="middle" fill="white" font-size="${fs}" font-family="sans-serif" font-weight="bold">${label}</text></svg>`;
  return L.divIcon({html:s,className:'',iconSize:[30,38],iconAnchor:[15,38]});
}
function makeNum(c,n){
  const t=n>99?'…':String(n),fs=t.length>2?7:9;
  const s=`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26">
    <circle cx="13" cy="13" r="12" fill="${c}" stroke="white" stroke-width="2"/>
    <text x="13" y="17" text-anchor="middle" fill="white" font-size="${fs}" font-family="sans-serif" font-weight="bold">${t}</text></svg>`;
  return L.divIcon({html:s,className:'',iconSize:[26,26],iconAnchor:[13,13]});
}
function getLabel(item,mode){
  if(mode==='seq')return String(item.seq);
  if(mode==='code')return item.name.slice(-3);
  return AB[item.branch]||item.branch.substring(0,2);
}

function loadSV(lat,lng){
  const img=document.getElementById('sv-img'),load=document.getElementById('sv-loading'),none=document.getElementById('sv-none');
  img.style.display='none';none.style.display='none';load.style.display='flex';
  fetch(`https://maps.googleapis.com/maps/api/streetview/metadata?location=${lat},${lng}&key=${GKEY}`)
    .then(r=>r.json()).then(d=>{
      load.style.display='none';
      if(d.status==='OK'){img.src=`https://maps.googleapis.com/maps/api/streetview?size=640x160&location=${lat},${lng}&fov=90&key=${GKEY}`;img.style.display='block';}
      else none.style.display='flex';
    }).catch(()=>{load.style.display='none';none.style.display='flex';});
}

function openSheet(){document.getElementById('sheet').classList.add('open');sheetOpen=true;setTimeout(()=>map.invalidateSize(),350);}
function closeSheet(){document.getElementById('sheet').classList.remove('open');sheetOpen=false;setTimeout(()=>map.invalidateSize(),350);}
document.getElementById('sheet-handle').addEventListener('click',()=>sheetOpen?closeSheet():openSheet());

function onMk(d){
  const m=d.item,c=d.c,ts=`background:${c}22;color:${c};border:1px solid ${c}55;`;
  document.getElementById('sheet-name').textContent=m.name;
  document.getElementById('sheet-name').style.color=c;
  document.getElementById('route-wrap').style.display='none';
  document.getElementById('sheet-body').innerHTML=`
    <div style="margin-bottom:10px">
      <span class="tag" style="${ts}">${m.branch}</span>
      <span class="tag" style="background:#21262d;color:#8b949e;border:1px solid #30363d">${m.seq}번</span>
    </div>
    <div class="ir"><span class="il">선로</span><span class="iv">${m.line} ${m.lineNo}</span></div>
    <div class="ir"><span class="il">전산화번호</span><span class="iv" style="font-family:monospace;color:#79b8ff">${m.name}</span></div>
    <div class="ir"><span class="il">주소</span><span class="iv" style="color:#8b949e;font-size:11px">${m.address}</span></div>`;
  const btn=document.getElementById('rvbtn');
  btn.style.display='block';
  btn.onclick=()=>window.open(`https://map.kakao.com/?map_type=TYPE_ROADVIEW&q=${encodeURIComponent(m.address)}`,'_blank');
  loadSV(d.lat,d.lng);
  openSheet();
  map.panTo([d.lat,d.lng]);
}

MH.forEach(item=>{
  const c=BC[item.branch]||'#888';
  const mk=L.marker([item.lat,item.lng],{icon:makePin(c,getLabel(item,curMode))}).addTo(map);
  const d={item,lat:item.lat,lng:item.lng,mk,c};
  GD.push(d);
  mk.on('click',()=>onMk(d));
});

document.querySelectorAll('.mmode').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.mmode').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');curMode=this.dataset.m;
    GD.forEach(d=>{if(map.hasLayer(d.mk))d.mk.setIcon(makePin(d.c,getLabel(d.item,curMode)));} );
  });
});

document.querySelectorAll('.bb').forEach(btn=>{
  btn.addEventListener('click',function(){
    const b=this.dataset.b;
    if(b==='all'){
      const allOn=[...document.querySelectorAll('.bb:not([data-b="all"])')].every(x=>x.classList.contains('on'));
      document.querySelectorAll('.bb').forEach(x=>{allOn?x.classList.remove('on'):x.classList.add('on');});
    }else this.classList.toggle('on');
    let v=0;
    const act=new Set([...document.querySelectorAll('.bb.on')].map(b=>b.dataset.b));
    GD.forEach(d=>{
      const show=act.has('all')||act.has(d.item.branch);
      if(show){if(!map.hasLayer(d.mk)){d.mk.setIcon(makePin(d.c,getLabel(d.item,curMode)));d.mk.addTo(map);}v++;}
      else{if(map.hasLayer(d.mk))map.removeLayer(d.mk);}
    });
    document.getElementById('hd-cnt').textContent=v+'개';
  });
});

document.getElementById('rbtn').addEventListener('click',function(){
  const pts=GD.filter(d=>map.hasLayer(d.mk));
  if(!pts.length){alert('표시된 맨홀이 없습니다.');return;}
  this.disabled=true;this.textContent='계산 중...';
  setTimeout(()=>{
    if(PL){map.removeLayer(PL);PL=null;}
    GD.forEach(d=>{if(map.hasLayer(d.mk))d.mk.setIcon(makePin(d.c,getLabel(d.item,curMode)));} );
    const route=nn([...pts]);
    PL=L.polyline(route.map(d=>[d.lat,d.lng]),{color:'#e94560',weight:2,opacity:0.85}).addTo(map);
    route.forEach((d,i)=>d.mk.setIcon(makeNum(d.c,i+1)));
    const rl=document.getElementById('route-list');
    document.getElementById('route-title').textContent=`🗺️ 최적경로 ${route.length}개소`;
    rl.innerHTML='';
    route.forEach((d,i)=>{
      const div=document.createElement('div');div.className='ri';
      div.innerHTML=`<div class="rn" style="background:${d.c}">${i+1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;color:#e6edf3;font-family:monospace">${d.item.name}</div>
          <div style="font-size:11px;color:#8b949e">${d.item.branch} · ${d.item.seq}번</div>
          <div style="font-size:10px;color:#30363d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.item.address}</div>
        </div>`;
      div.addEventListener('click',()=>{map.setView([d.lat,d.lng],17);onMk(d);});
      rl.appendChild(div);
    });
    document.getElementById('sheet-body').innerHTML='';
    ['sv-img','sv-loading','sv-none'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('sheet-name').textContent=`최적경로 ${route.length}개소`;
    document.getElementById('sheet-name').style.color='#f5a623';
    document.getElementById('rvbtn').style.display='none';
    document.getElementById('route-wrap').style.display='block';
    openSheet();
    map.fitBounds(PL.getBounds(),{padding:[50,50]});
    document.getElementById('clr-btn').style.display='block';
    this.textContent='🗺️ 최적경로';this.disabled=false;
  },50);
});

document.getElementById('clr-btn').addEventListener('click',function(){
  if(PL){map.removeLayer(PL);PL=null;}
  GD.forEach(d=>{if(map.hasLayer(d.mk))d.mk.setIcon(makePin(d.c,getLabel(d.item,curMode)));} );
  document.getElementById('route-list').innerHTML='';
  document.getElementById('route-wrap').style.display='none';
  ['sv-img','sv-loading','sv-none'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('sheet-name').textContent='마커를 탭하세요';
  document.getElementById('sheet-name').style.color='#30363d';
  closeSheet();this.style.display='none';
});

function nn(pts){
  if(!pts.length)return[];
  let u=[...pts],r=[u.splice(0,1)[0]];
  while(u.length){
    const last=r[r.length-1];let ni=0,nd=Infinity;
    for(let i=0;i<u.length;i++){const d2=(last.lat-u[i].lat)**2+(last.lng-u[i].lng)**2;if(d2<nd){nd=d2;ni=i;}}
    r.push(u.splice(ni,1)[0]);
  }
  return r;
}
map.on('click',()=>{if(sheetOpen)closeSheet();});
</script>
